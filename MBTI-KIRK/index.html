<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">性格診断 — あなたの隠れた本質を暴く</title>
  <meta name="description" content="2択の質問に答えるだけで、あなたの隠れた性格タイプが明らかになります。MBTIライクの本格的な性格診断。" />
  <meta property="og:title" content="性格診断 — あなたの本質を暴く" />
  <meta property="og:description" content="2択の質問に答えるだけ。あなただけの性格タイプが明らかになります。" />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- パーティクル背景 -->
  <canvas id="particles-canvas" aria-hidden="true"></canvas>

  <!-- グラデーション背景 -->
  <div class="bg-gradient" aria-hidden="true"></div>

  <!-- ===========================
       言語切替ボタン（常時表示）
       =========================== -->
  <button id="btn-lang-toggle" class="lang-toggle" aria-label="Switch language">
    <img id="lang-flag" class="lang-flag-img" src="https://flagcdn.com/24x18/jp.png" alt="JP" />
    <span id="lang-code" class="lang-code">JA</span>
  </button>

  <!-- BGM再生中インジケーター（結果画面で表示） -->
  <div id="bgm-indicator" class="bgm-indicator" title="クリックで停止" aria-live="polite">
    <span class="bgm-icon">♪</span>
    <span class="bgm-label" id="bgm-label-text">BGM再生中:</span>
    <span class="bgm-filename"></span>
    <span class="bgm-stop">✕</span>
  </div>

  <div class="app-wrapper">

    <!-- ===========================
         言語選択画面（初回起動時）
         =========================== -->
    <section id="screen-lang" class="screen" aria-label="Language selection">
      <div class="lang-select-container">
        <div class="lang-select-logo">
          <span class="dot"></span>
          Personality Type Analyzer
        </div>
        <h1 class="lang-select-title" id="lang-select-title">言語を選択してください</h1>
        <p class="lang-select-sub" id="lang-select-sub">Select your language</p>
        <div class="lang-cards">
          <button class="lang-card" id="btn-lang-ja" aria-label="日本語を選択">
            <img class="lang-card-flag-img" src="https://flagcdn.com/80x60/jp.png" alt="Japan" />
            <span class="lang-card-name">日本語</span>
            <span class="lang-card-native">Japanese</span>
          </button>
          <button class="lang-card" id="btn-lang-en" aria-label="Select English">
            <img class="lang-card-flag-img" src="https://flagcdn.com/80x60/us.png" alt="USA" />
            <span class="lang-card-name">English</span>
            <span class="lang-card-native">英語</span>
          </button>
        </div>
      </div>
    </section>

    <!-- ===========================
         スタート画面
         =========================== -->
    <section id="screen-start" class="screen" aria-label="診断スタート画面">
      <div class="start-container">

        <div class="logo-badge">
          <span class="dot"></span>
          <span id="logo-badge-text">Personality Type Analyzer</span>
        </div>

        <h1 class="start-title" id="start-title">
          あなたの<br>隠れた本質を<br>暴く診断
        </h1>

        <p class="start-subtitle-main" id="start-subtitle">
          直感で答えてください。<br>
          選択肢があなたの性格タイプを形作っていきます。
        </p>

        <div class="stats-row">
          <div class="stat-badge">
            <span class="num" id="stat-questions">12</span>
            <span class="label" id="stat-label-q">問</span>
          </div>
          <div class="stat-badge">
            <span class="num">4<sup style="font-size:0.6em" id="stat-label-choices">択</sup></span>
            <span class="label" id="stat-label-each">各問</span>
          </div>
          <div class="stat-badge">
            <span class="num" id="stat-time">約2分</span>
            <span class="label" id="stat-label-time">所要時間</span>
          </div>
        </div>

        <button id="btn-start" class="btn-primary" aria-label="診断を開始する">
          <span id="start-btn-text">診断スタート</span>
          <span class="btn-arrow" aria-hidden="true">→</span>
        </button>

        <p class="start-note" id="start-note">※ 個人情報の収集はありません</p>

      </div>
    </section>


    <!-- ===========================
         クイズ画面
         =========================== -->
    <section id="screen-quiz" class="screen" aria-label="質問画面">
      <div class="quiz-container">

        <!-- ヘッダー（進捗） -->
        <div class="quiz-header">
          <div class="question-counter" aria-label="質問の進行状況">
            <span class="current" id="question-number">1</span>
            <span> / </span>
            <span id="question-total">8</span>
          </div>

          <div class="progress-container" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
          </div>

          <span class="progress-percent" id="progress-percent">0%</span>
        </div>

        <!-- アルファベット蓄積表示（SHOW_LETTERS_DURING_QUIZ=trueの時のみ表示） -->
        <div class="letter-display" id="letter-display" aria-live="polite" aria-label="現在の性格タイプ">
          <span class="letter-label" id="letter-label-text">あなたのタイプ</span>
          <span class="current-letters" id="current-letters">—</span>
        </div>

        <!-- 質問カード -->
        <div class="question-card" id="question-card">
          <p class="question-text" id="question-text"></p>

          <!-- 選択肢コンテナ（JSで動的に生成） -->
          <div class="choices" id="choices-container" role="group" aria-label="選択肢"></div>
        </div>

        <!-- キーボードショートカットのヒント（JSで動的に更新） -->
        <p class="keyboard-hint" id="keyboard-hint">
          キーボード: <kbd class="key-badge">1</kbd> / <kbd class="key-badge">2</kbd> で選択
        </p>

      </div>
    </section>


    <!-- ===========================
         結果画面
         =========================== -->
    <section id="screen-result" class="screen" aria-label="診断結果画面">
      <div class="result-container">
        <div class="result-card">
          <div class="result-portrait-wrap" aria-hidden="true">
            <img
              id="result-portrait"
              class="result-portrait"
              src="img/entp-kirk.png"
              alt=""
              loading="lazy"
            />
          </div>

          <p class="result-label" id="result-label">あなたの性格タイプ</p>
          <div class="result-type" id="result-type" aria-live="assertive"></div>
          <div class="result-divider" aria-hidden="true"></div>

          <!-- トートロジー説明文 -->
          <p class="result-description" id="result-description"></p>

          <!-- ボタン -->
          <div class="result-actions">
            <button id="btn-retry" class="btn-secondary" aria-label="もう一度診断する">
              <span>🔄</span>
              <span id="retry-btn-text">もう一度やる</span>
            </button>
            <button id="btn-bgm-stop" class="btn-bgm-stop" aria-label="BGMを停止する" style="display:none;">
              <span>⏹</span>
              <span id="bgm-stop-btn-text">BGM停止</span>
            </button>
            <button id="btn-share" class="btn-share" aria-label="結果をシェアする">
              <span>📤</span>
              <span id="share-btn-text">結果をシェア</span>
            </button>
          </div>

        </div>
      </div>
    </section>

  </div><!-- /.app-wrapper -->

  <script src="i18n.js"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
